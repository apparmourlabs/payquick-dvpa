name: Build & Release APK

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayQuick-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: PayQuick-debug

      - name: Rename APK
        run: mv app-debug.apk PayQuick-v2.3.1-dvpa.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.3.1
          name: "PayQuick DVPA v2.3.1"
          body: |
            ## PayQuick — Damn Vulnerable Payment App

            A deliberately vulnerable UPI payment app with **22 intentional OWASP MASVS vulnerabilities** for mobile security training.

            ### Download
            - **PayQuick-v2.3.1-dvpa.apk** — Install on Android device or emulator

            ### Scan It
            Upload to [AppArmour Labs](https://apparmourlabs.com/scan) for automated security analysis.

            ### Vulnerabilities
            - 5 Data Storage issues
            - 3 Cryptography weaknesses
            - 3 Network Security flaws
            - 4 Platform Security gaps
            - 4 Code Quality problems
            - 3 App Resilience missing controls

            See [README](https://github.com/apparmourlabs/payquick-dvpa#readme) for challenge hints.
          files: PayQuick-v2.3.1-dvpa.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
